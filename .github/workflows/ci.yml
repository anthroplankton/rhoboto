name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version-file: .python-version

      - name: Set up uv
        uses: astral-sh/setup-uv@v6
        with:
          version: "0.11.11"
          enable-cache: true

      - name: Install dependencies
        run: |
          uv lock --check
          uv sync --locked

      - name: Run Ruff lint
        run: uv run ruff check --no-fix .

      - name: Check Ruff formatting
        run: uv run ruff format --check .

      - name: Run tests
        run: >
          uv run pytest
          --cov=bot
          --cov=cogs
          --cov=components
          --cov=models
          --cov=utils
          --cov-report=term-missing
          --cov-fail-under=35

      - name: Compile Python modules
        run: uv run python -m compileall -q main.py bot cogs components models utils
